name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: ${{ matrix.job }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        job: [fmt, clippy, test, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies (eframe / winit / rfd)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-${{ matrix.os }}-${{ matrix.job }}

      - name: cargo fmt --check
        if: matrix.job == 'fmt'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        if: matrix.job == 'test'
        run: cargo test --workspace

      - name: cargo build (release)
        if: matrix.job == 'build'
        run: cargo build --workspace --release
